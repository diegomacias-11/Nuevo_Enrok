{% extends "base.html" %}
{% block title %}Reportes{% endblock %}

{% block extra_head %}
  <style>
    html,
    body {
      height: 100%;
    }

    body.reportes-no-scroll {
      overflow: hidden;
    }

    .full-bleed {
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
    }

    #ls-iframe {
      display: block;
      width: 100%;
      height: 90vh;
      border: 0;
    }
  </style>
{% endblock %}

{% block content %}
  <section class="page-shell">
    <section class="page-title-bar">
      <div class="page-title-copy">
        <h1 class="page-title">Reportes</h1>
      </div>
    </section>

    <div class="full-bleed">
      <iframe
        id="ls-iframe"
        src="https://lookerstudio.google.com/embed/reporting/f06f3320-4b81-46d6-be9c-c303e81a2550/page/p_vqj39zw0zd?rm=minimal"
        allowfullscreen
        sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
      </iframe>
    </div>
  </section>
  <script>
    (function(){
      document.body.classList.add('reportes-no-scroll');
    })();
  </script>
{% endblock %}
